[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "edda"
version = "0.1.0"
description = "Edda the Lightweight Vector Search Engine"
readme = "README.md"
requires-python = ">=3.10"
license = { file = "LICENSE" }
authors = [
  { name = "Dmitrii Gilemkhanov", email = "dima.rize@yandex.ru" },
]
dependencies = ["numpy"]

[dependency-groups]
dev = ["ruff", "ty", "prek", "pytest"]
examples = ["pydantic-ai"]

[tool.uv.workspace]
members = ["edda-mcp"]

[tool.uv.sources]
edda-mcp = { workspace = true }

[tool.hatch.build.targets.wheel]
packages = ["python/edda"]

[tool.hatch.build.targets.wheel.hooks.custom]
path = "hatch_build.py"

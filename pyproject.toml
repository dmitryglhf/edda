[build-system]
requires = ["uv_build>=0.10.9,<0.11.0"]
build-backend = "uv_build"

[project]
name = "edda"
version = "0.0.0"
description = "Edda the Lightweight Vector Search Engine"
readme = "README.md"
requires-python = ">=3.12"
license = { file = "LICENSE" }
authors = [
  { name = "Dmitrii Gilemkhanov", email = "dima.rize@yandex.ru" },
]
dependencies = []

[project.optional-dependencies]
dev = ["ruff"]

[tool.uv.build-backend]
packages = [{ include = "edda", from = "python" }]
include = [
  "python/edda/py.typed",
  "python/edda/_edda.*",
]

[tool.uv.sources]
"src/*.zig" = false

name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

env:
  ZIG_VERSION: "0.15.2"

jobs:
  build-wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: mlugg/setup-zig@v2
        if: runner.os != 'Linux'
        with:
          version: ${{ env.ZIG_VERSION }}

      - uses: pypa/cibuildwheel@v2.22
        env:
          CIBW_BUILD: "cp310-* cp311-* cp312-* cp313-*"
          CIBW_SKIP: "*-musllinux_* *-win32 *-manylinux_i686"
          CIBW_ARCHS_MACOS: "arm64"
          CIBW_REPAIR_WHEEL_COMMAND_MACOS: ""
          CIBW_BEFORE_ALL_LINUX: |
            ARCH=$(uname -m)
            curl -L https://ziglang.org/download/${{ env.ZIG_VERSION }}/zig-${ARCH}-linux-${{ env.ZIG_VERSION }}.tar.xz | tar -xJ -C /usr/local
            ln -sf /usr/local/zig-${ARCH}-linux-${{ env.ZIG_VERSION }}/zig /usr/local/bin/zig
          CIBW_ENVIRONMENT_LINUX: "PATH=/usr/local/bin:$PATH"
          CIBW_TEST_REQUIRES: "numpy pytest"
          CIBW_TEST_COMMAND: "pytest {project}/python/tests -v"

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: wheelhouse/*.whl

  build-sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv build --sdist
      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  publish-testpypi:
    name: Publish to TestPyPI
    needs: [build-wheels, build-sdist]
    runs-on: ubuntu-latest
    # Run on manual dispatch or on tags ending with -test (e.g. v0.2.0-test).
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && endsWith(github.ref, '-test'))
    environment:
      name: testpypi
      url: https://test.pypi.org/p/pyedda
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  publish-pypi:
    name: Publish to PyPI
    needs: [build-wheels, build-sdist]
    runs-on: ubuntu-latest
    # Real PyPI only on real tags — not workflow_dispatch, not -test tags.
    if: >
      github.event_name == 'push' &&
      startsWith(github.ref, 'refs/tags/v') &&
      !endsWith(github.ref, '-test')
    environment:
      name: pypi
      url: https://pypi.org/p/pyedda
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - uses: pypa/gh-action-pypi-publish@release/v1

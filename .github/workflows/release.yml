name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

env:
  ZIG_VERSION: "0.15.2"

jobs:
  build-wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      # On Linux cibuildwheel runs inside a manylinux container, so Zig is
      # installed separately via CIBW_BEFORE_ALL_LINUX below.
      - uses: mlugg/setup-zig@v2
        if: runner.os != 'Linux'
        with:
          version: ${{ env.ZIG_VERSION }}

      - uses: pypa/cibuildwheel@v2.22
        env:
          CIBW_BUILD: "cp310-* cp311-* cp312-* cp313-*"
          CIBW_SKIP: "*-musllinux_* *-win32 *-manylinux_i686"

          # Install Zig inside the manylinux container.
          # ARCH is detected at runtime so this works for both x86_64 and aarch64.
          CIBW_BEFORE_ALL_LINUX: |
            ARCH=$(uname -m)
            curl -L https://ziglang.org/download/${{ env.ZIG_VERSION }}/zig-${ARCH}-linux-${{ env.ZIG_VERSION }}.tar.xz | tar -xJ -C /usr/local
            ln -sf /usr/local/zig-${ARCH}-linux-${{ env.ZIG_VERSION }}/zig /usr/local/bin/zig

          CIBW_ENVIRONMENT_LINUX: "PATH=/usr/local/bin:$PATH"

          # Smoke test every built wheel in an isolated environment.
          CIBW_TEST_REQUIRES: "numpy pytest"
          CIBW_TEST_COMMAND: "pytest {project}/python/tests -v"

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: wheelhouse/*.whl

  build-sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv build --sdist
      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  publish:
    name: Publish to PyPI
    needs: [build-wheels, build-sdist]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    environment:
      name: pypi
      url: https://pypi.org/p/eddadb
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - uses: pypa/gh-action-pypi-publish@release/v1
